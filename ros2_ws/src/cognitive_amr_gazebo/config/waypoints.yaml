# Warehouse waypoints — coordinates match tugbot_style_ai_warehouse.sdf
# All poses are in the map frame (meters). Yaw in radians.
# frame_id: map

waypoints:

  # ── Charging docks ──────────────────────────────────────────
  charging_dock_1:
    x: -9.3
    y: -6.5
    yaw: 0.0
    zone: charging

  charging_dock_2:
    x: -9.3
    y: -4.8
    yaw: 0.0
    zone: charging

  # ── Picking / packing stations ───────────────────────────────
  picking_station_1:
    x: -7.2
    y: 5.7
    yaw: 1.5708   # facing east (+x), toward the shelf aisles
    zone: packing

  picking_station_2:
    x: -7.2
