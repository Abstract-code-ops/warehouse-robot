# Demo task queue — 24 tasks for AI scheduler showcase
# Fields:
#   id          : unique task ID
#   type        : pick | transfer | replenishment | charge
#   priority    : 1 (highest / rush) → 3 (low / background)
#   sku         : item identifier (for display)
#   source      : waypoint name (where robot goes to pick)
#   destination : waypoint name (where robot delivers)
#   deadline_s  : seconds from demo start before SLA breach (shown on UI)
#   weight_kg   : payload weight (used in battery cost estimate)
#   notes       : shown by LLM supervisor when explaining the decision

tasks:

  # ── RUSH ORDERS (priority 1, tight deadlines) ─────────────────
  - id: T001
    type: pick
    priority: 1
    sku: SKU-A17
    source: shelf_A3
    destination: picking_station_1
    deadline_s: 120
    weight_kg: 2.1
    notes: "Express shipment — customer SLA breach in 2 min. Must go first."

  - id: T002
    type: pick
    priority: 1
    sku: SKU-B04
    source: shelf_B1
    destination: dispatch_zone
    deadline_s: 180
    weight_kg: 3.5
    notes: "Cold-chain item. Direct to dispatch — skip packing station."

  - id: T003
    type: pick
